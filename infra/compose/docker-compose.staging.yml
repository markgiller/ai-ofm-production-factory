services:
  comfyui_staging:
    build:
      context: ../docker/staging
      dockerfile: Dockerfile
      args:
        # Must stay in sync with COMFYUI_VERSION in staging.env
        COMFYUI_VERSION: ${COMFYUI_VERSION:-v0.16.4}
    image: ofm_comfyui_staging:latest
    container_name: comfyui_staging
    restart: unless-stopped

    ports:
      - "${COMFYUI_PORT:-8188}:8188"

    volumes:
      # On Runpod: network volume auto-mounts at /workspace
      # Local dev: set NETWORK_VOLUME_PATH=./local_workspace in your shell
      - "${NETWORK_VOLUME_PATH:-/workspace}:/workspace"

    env_file:
      - ../env/staging.env

    environment:
      # These override staging.env if set in the shell environment.
      # Useful for quick overrides without editing the env file.
      - COMFYUI_PORT=${COMFYUI_PORT:-8188}
      - NETWORK_VOLUME_PATH=${NETWORK_VOLUME_PATH:-/workspace}
      - VRAM_MODE=${VRAM_MODE:-highvram}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # count: 1 for single 4090 pod
              # Use count: all if the pod has multiple GPUs
              # Note: device_ids is for specific IDs from `nvidia-smi` — not used here
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
