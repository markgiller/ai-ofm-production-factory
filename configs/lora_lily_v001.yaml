---
# ─────────────────────────────────────────────────────────────────────────────
# LoRA Training Config — lily_v001 on FLUX.1 Dev 12B
# ai-toolkit (ostris) — RTX 4090 24GB
#
# Character: Lily | Trigger: "lily" | Dataset: 36 images
# ─────────────────────────────────────────────────────────────────────────────

job: extension
config:
  name: "lora_lily_v001"
  process:
    - type: "sd_trainer"
      training_folder: "/workspace/lora_training/lily_v001/output"
      device: "cuda:0"
      trigger_word: "lily"

      # ── Model ─────────────────────────────────────────────────────────────
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        quantize: true        # fp8 quantization — fits 24GB VRAM

      # ── LoRA Network ──────────────────────────────────────────────────────
      network:
        type: "lora"
        linear: 32             # rank 32 — optimal for 12B model identity lock
        linear_alpha: 16       # alpha = rank/2 (standard)

      # ── Training ──────────────────────────────────────────────────────────
      train:
        batch_size: 1
        steps: 2500            # ~70 steps/image for 36 images
        gradient_accumulation_steps: 1
        lr: 8e-5               # lower end for stability with 36-image dataset
        optimizer: "adamw8bit"
        lr_scheduler: "constant"
        max_denoising_steps: 50
        content_or_style: "balanced"
        skip_first_sample: true
        disable_sampling: true  # skip sample generation (faster training)

      # ── Save ──────────────────────────────────────────────────────────────
      save:
        dtype: "bf16"
        save_every: 150        # ~17 checkpoints for sweet spot hunting
        max_step_saves_to_keep: 20

      # ── Dataset ───────────────────────────────────────────────────────────
      datasets:
        - folder_path: "/workspace/lora_training/lily_v001/img"
          caption_ext: "txt"
          caption_dropout_rate: 0.05    # 5% dropout — prevents trigger overfitting
          resolution: 1024
          default_caption: "lily"
          random_scale: false
          bucket_tolerance: 64
