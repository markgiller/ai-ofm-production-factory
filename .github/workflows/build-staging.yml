name: Build & Push — ComfyUI Staging

on:
  # Запускается автоматически при push в main, если изменился Docker-слой
  push:
    branches: [main]
    paths:
      - "infra/docker/staging/**"
  # Запускается вручную из GitHub UI в любой момент
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GitHub Actions runner поставляется с ~14GB диска, большая часть занята
      # ненужным нам ПО (Android SDK ~8GB, .NET, Haskell и т.д.).
      # Этот шаг освобождает ~30GB перед сборкой тяжёлого CUDA image.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Buildx даёт layer caching и более быструю сборку
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: infra/docker/staging
          file: infra/docker/staging/Dockerfile
          push: true
          tags: |
            markgiller/ofm_comfyui_staging:latest
            markgiller/ofm_comfyui_staging:${{ github.sha }}
          # GitHub Actions cache — повторные сборки в разы быстрее
          cache-from: type=gha
          cache-to: type=gha,mode=max
